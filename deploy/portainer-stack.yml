version: "3.8"

services:
  odontocontrol_app:
    image: williamwilmer10/odontocontrol:${APP_VERSION:-latest}
    networks:
      - wapainelnet
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - PORT=3000
      - DATABASE_URL=postgresql://odontocontrol:${DB_PASSWORD:-CHANGE_ME}@odontocontrol_db:5432/odontocontrol
      - SUPABASE_URL=${SUPABASE_URL:-https://example.supabase.co}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-CHANGE_ME}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-CHANGE_ME}
      - VITE_SUPABASE_URL=${SUPABASE_URL:-https://example.supabase.co}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-CHANGE_ME}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@admin.com}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-@Admin.com}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 64M
      labels:
        - traefik.enable=true
        - traefik.http.routers.odontocontrol_app.rule=Host(`odontocontrol.seudominio.com.br`)
        - traefik.http.routers.odontocontrol_app.entrypoints=websecure
        - traefik.http.routers.odontocontrol_app.tls.certresolver=letsencryptresolver
        - traefik.http.routers.odontocontrol_app.service=odontocontrol_app
        - traefik.http.services.odontocontrol_app.loadbalancer.server.port=3000
        - traefik.http.services.odontocontrol_app.loadbalancer.passHostHeader=true

  odontocontrol_db:
    image: pgvector/pgvector:pg16
    networks:
      - wapainelnet
    environment:
      - POSTGRES_DB=odontocontrol
      - POSTGRES_USER=odontocontrol
      - POSTGRES_PASSWORD=${DB_PASSWORD:-CHANGE_ME}
      - TZ=America/Sao_Paulo
    volumes:
      - odontocontrol_db_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  odontocontrol_db_data:

networks:
  wapainelnet:
    external: true
